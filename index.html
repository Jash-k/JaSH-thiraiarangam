eight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; } .hero-controls { position: absolute; right: 40px; bottom: 40px; z-index: 4; display: flex; gap: 8px; } .hero-dot { width: 10px; height: 10px; border-radius: 5px; background: rgba(255,255,255,0.3); cursor: pointer; } .hero-dot.active { width: 28px; background: var(--accent); }

<body>

  <!-- Ambient Blobs -->
  <div class="ambient-wrap">
    <div class="ambient-blob blob-red"></div>
    <div class="ambient-blob blob-amber"></div>
  </div>

  <div class="main-container">
    
    <!-- Top Bar -->
    <header class="topbar">
      <!-- BRAND HEADING IN TAMIL AS REQUESTED -->
      <a href="#" class="logo" id="logoLink">
        <div class="logo-icon"><i class="fas fa-film"></i></div>
        <div>
          <span class="logo-text">JaSH திரையரங்கம்</span>
          <span class="logo-sub">Tamil OTT Catalogue</span>
        </div>
      </a>

      <!-- NAVIGATION TABS IN ENGLISH -->
      <nav class="nav-tabs">
        <button class="nav-btn active" id="tab-home"><i class="fas fa-home"></i> Home</button>
        <button class="nav-btn" id="tab-play"><i class="fas fa-play-circle"></i> Tamil Movies</button>
        <button class="nav-btn" id="tab-dub"><i class="fas fa-globe-asia"></i> Tamil Dubbed</button>
        <button class="nav-btn" id="tab-saved"><i class="fas fa-bookmark"></i> Watchlist</button>
      </nav>

      <div class="header-actions">
        <div class="search-wrap">
          <i class="fas fa-search search-icon"></i>
          <input type="text" id="searchInput" class="search-input" placeholder="Search movie title or ID...">
          <i class="fas fa-times clear-search" id="clearSearchBtn"></i>
        </div>

        <button class="action-icon-btn" id="themeBtn" title="Cycle Theme"><i class="fas fa-moon"></i></button>
      </div>
    </header>

    <!-- Main Feed Section -->
    <main id="feedStage">
      
      <!-- Hero Carousel -->
      <section class="hero-banner" id="heroBanner">
        <div class="hero-slider-wrap" id="heroSlider"></div>
        <div class="hero-controls" id="heroDots"></div>
      </section>

      <!-- Subbar Filters -->
      <section class="filter-bar" id="filterBar">
        <div class="filter-left">
          <div class="cat-pills">
            <button class="pill active" id="pill-all">All</button>
            <button class="pill" id="pill-Movie">Movies</button>
            <button class="pill" id="pill-Series">Series</button>
          </div>

          <div class="select-wrap">
            <select class="custom-select" id="yearSelect">
              <option value="all">All Release Years</option>
            </select>
          </div>

          <div class="multi-dropdown" id="genreDropdownWrap">
            <button class="multi-dropdown-btn" id="genreDropdownBtn">
              <i class="fas fa-filter"></i> <span id="genreLabel">Genres</span>
            </button>
            <div class="multi-dropdown-menu" id="genreMenuList"></div>
          </div>
        </div>

        <div class="filter-right">
          <div class="select-wrap">
            <select class="custom-select" id="sortSelect">
              <option value="newest">🔥 Newest Releases</option>
              <option value="rating">⭐ Highest Rated</option>
              <option value="az">🔤 Title (A - Z)</option>
            </select>
          </div>

          <button class="btn-reset" id="resetFiltersBtn"><i class="fas fa-undo"></i> Reset Filters</button>
        </div>
      </section>

      <!-- Active Filters Subrow -->
      <div class="active-filters" id="activeFiltersContainer">
        <span class="stats-badge" id="statsCountBadge">Loading catalogue...</span>
      </div>

      <!-- Movies Grid -->
      <div class="movies-grid" id="moviesGrid"></div>

      <!-- Pagination Controls -->
      <div class="pagination" id="paginationControls"></div>
    </main>

    <!-- Watchlist & History Section -->
    <section class="watchlist-section" id="savedStage">
      <div class="section-head">
        <span>🔖 My Watchlist</span>
        <button class="btn-reset" id="clearWatchlistBtn"><i class="fas fa-trash"></i> Clear Watchlist</button>
      </div>
      <div class="movies-grid" id="watchlistGrid"></div>

      <div class="section-head" style="margin-top:48px;">
        <span>🕒 Watch History</span>
        <button class="btn-reset" id="clearHistoryBtn"><i class="fas fa-trash"></i> Clear History</button>
      </div>
      <div class="movies-grid" id="historyGrid"></div>
    </section>

  </div>

  <!-- Cinema Theatre Modal Viewport -->
  <div class="theatre-viewport" id="theatreModal">
    <div class="theatre-topbar">
      <button class="btn-back"><i class="fas fa-arrow-left"></i> Back to Catalogue</button>
      
      <div class="playing-header">
        <div class="playing-title" id="modalPlayingTitle">Movie Title</div>
        <div class="playing-id" id="modalPlayingId">STREAM #0000</div>
      </div>

      <div style="width:140px;"></div>
    </div>

    <div class="theatre-stage" id="theatreStageArea">
      
      <!-- Video Player -->
      <div class="player-container" id="playerContainer">
        <iframe class="player-iframe" id="playerIframe" allowfullscreen sandbox="allow-same-origin allow-scripts allow-forms allow-presentation"></iframe>
      </div>

      <!-- Player Toolbar -->
      <div class="theatre-toolbar">
        <div class="tool-group">
          <button class="tool-btn" id="lightsBtn"><i class="fas fa-lightbulb"></i> Lights Off</button>
          <button class="tool-btn" id="widescreenBtn"><i class="fas fa-expand"></i> Theatre Mode</button>
          
          <div class="select-wrap">
            <select class="custom-select" id="serverSelect">
              <option value="direct">🚀 Server 1 (Direct Embed)</option>
              <option value="reload">🔄 Server 2 (Reload Safe)</option>
              <option value="external">↗️ Open External Tab</option>
            </select>
          </div>
        </div>

        <div class="tool-group">
          <button class="tool-btn" id="shareBtn"><i class="fas fa-share-alt"></i> Share Link</button>
          <button class="tool-btn" id="modalWatchlistBtn"><i class="fas fa-bookmark"></i> Watchlist</button>
        </div>
      </div>

      <!-- Multi Part / Episodes Strip -->
      <div class="episodes-strip" id="episodesStrip">
        <div class="strip-header"><i class="fas fa-layer-group" style="color:var(--accent);"></i> Episodes / Parts</div>
        <div class="strip-scroll" id="episodesList"></div>
      </div>

      <!-- Metadata Box -->
      <div class="meta-box" id="metaBox">
        <div class="meta-poster">
          <img id="metaPosterImg" src="" alt="Poster">
        </div>
        <div class="meta-details">
          <h1 class="meta-title" id="metaTitle">Title</h1>
          <div class="meta-tags" id="metaTags"></div>
          <p class="meta-plot" id="metaPlot">Plot synopsis</p>
          <div class="meta-grid" id="metaGrid"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toastMsg"><i class="fas fa-check-circle"></i> <span id="toastText">Success!</span></div>

  <!-- EXTERNAL MODULAR JS AS REQUESTED -->
  <script type="module" src="src/app.js"></script>

  <!-- Graceful Sandboxed Preview Script Fallback (Mirroring Modular App) -->
  <script>
    setTimeout(async () => {
      if (document.getElementById('moviesGrid').innerHTML.trim() !== '') return; // Module loaded fine
      
      console.log("⚡ Preview fallback mode active");
      let manifest = null, searchIdx = [], currentLoadedChunk = [], currentTab = 'home', activeCategory = 'play', currentPageNum = 1, searchQuery = '', activeMovieState = null;
      const WATCHLIST_KEY = 'jash_watchlist_v2';

      function showToastAlert(text) {
        const toast = document.getElementById('toastMsg'), txt = document.getElementById('toastText');
        if (txt) txt.innerText = text; if (toast) { toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3000); }
      }

      function getStoredList(k) { try { return JSON.parse(localStorage.getItem(k) || '[]'); } catch(e){ return []; } }
      function saveStoredList(k, l) { localStorage.setItem(k, JSON.stringify(l)); }

      function createMovieCard(m) {
        const colors = ['#e50914', '#f5c14a', '#8b5cf6', '#3b82f6', '#10b981', '#ec4899'];
        const bg = colors[parseInt(m.id||0, 10) % colors.length], ini = m.title ? m.title.substring(0, 2).toUpperCase() : 'JA', pts = m.prints ? m.prints.length : 1;
        return `<div class="movie-card" data-id="${m.id}" data-lib="${m.lib}"><div class="poster-box"><div class="fallback-avatar" style="color:${bg};">${ini}</div>${m.poster?`<img src="${m.poster}" class="poster-img" loading="lazy" alt="${m.title}" onerror="this.style.display='none'">`:''}<div class="card-badges"><span class="card-badge new">${m.lib==='play'?'Tamil':'Dubbed'}</span>${pts>1?`<span class="card-badge parts"><i class="fas fa-layer-group"></i> ${pts} Parts</span>`:''}</div><div class="hover-overlay"><div class="play-circle"><i class="fas fa-play"></i></div></div></div><div class="card-info"><div class="card-title">${m.title}</div><div class="card-meta"><span>⭐ ${m.rating||'N/A'}</span><span>${m.year||''}</span></div><div class="card-genres">${m.genres||'General'}</div></div></div>`;
      }

      function renderGrid(cid, list) {
        const grid = document.getElementById(cid); if (!grid) return;
        if (!list || !list.length) { grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon"><i class="fas fa-search"></i></div><div class="empty-title">No Titles Found</div><div class="empty-desc">Try adjusting your filters.</div></div>`; return; }
        grid.innerHTML = list.map(createMovieCard).join(''); attachHandlers();
      }

      function attachHandlers() {
        document.querySelectorAll('.movie-card').forEach(c => c.onclick = () => {
          const cid = c.getAttribute('data-id'), found = currentLoadedChunk.find(x=>x.id===cid) || searchIdx.find(x=>x.id===cid);
          if (found) openTheatreModal({ id: found.id, title: found.title||found.t, poster: found.poster||found.p, rating: found.rating||found.r, year: found.year||found.y, lib: found.lib||found.l, category: found.category||found.c, genres: found.genres||found.g, plot: found.plot, director: found.director, actors: found.actors, prints: found.prints||(found.pts?.map(pid=>({id:pid,title:`Part #${pid}`}))) }, cid);
        });
      }

      function openTheatreModal(movie, targetPrintId) {
        activeMovieState = movie;
        document.getElementById('theatreModal').classList.add('active'); document.body.style.overflow = 'hidden';
        const pts = movie.prints || [], selectedPid = targetPrintId || pts[0]?.id || movie.id;
        document.getElementById('modalPlayingTitle').innerText = movie.title; document.getElementById('modalPlayingId').innerText = `STREAM #${selectedPid}`;
        document.getElementById('metaPosterImg').src = movie.poster || ''; document.getElementById('metaTitle').innerText = movie.title; document.getElementById('metaPlot').innerText = movie.plot || 'No synopsis available.';
        document.getElementById('metaTags').innerHTML = `<span class="badge badge-accent">${movie.lib==='play'?'Tamil':'Dubbed'}</span><span class="badge badge-surface">${movie.category||'Movie'}</span>${movie.rating?`<span class="badge badge-gold">⭐ ${movie.rating}</span>`:''}`;
        document.getElementById('metaGrid').innerHTML = `<div><span>Director</span><strong>${movie.director||'N/A'}</strong></div><div><span>Cast & Actors</span><strong>${movie.actors||'N/A'}</strong></div><div><span>Genres</span><strong>${movie.genres||'General'}</strong></div><div><span>Runtime</span><strong>${movie.runtime||'N/A'}</strong></div><div><span>Release Date</span><strong>${movie.released||movie.year||'N/A'}</strong></div>`;
        const epStrip = document.getElementById('episodesStrip'), epList = document.getElementById('episodesList');
        if (pts.length > 1 && epStrip) {
          epStrip.classList.add('active'); epList.innerHTML = pts.map(p=>`<div class="ep-card${p.id===selectedPid?' active':''}" data-epid="${p.id}"><div class="ep-title">${p.title}</div><div class="ep-id">#${p.id}</div></div>`).join('');
          epList.querySelectorAll('.ep-card').forEach(ec => ec.onclick = () => {
            const epid = ec.getAttribute('data-epid'); epList.querySelectorAll('.ep-card').forEach(x=>x.classList.remove('active')); ec.classList.add('active');
            document.getElementById('modalPlayingId').innerText = `STREAM #${epid}`;
            const base = movie.lib==='play'?'https://play.onestream.today':'https://dub.onestream.today';
            document.getElementById('playerIframe').src = movie.lib==='play'?`${base}/stream/page/${epid}`:`${base}/stream/video/${epid}`;
          });
        } else if (epStrip) epStrip.classList.remove('active');
        const base = movie.lib==='play'?'https://play.onestream.today':'https://dub.onestream.today';
        document.getElementById('playerIframe').src = movie.lib==='play'?`${base}/stream/page/${selectedPid}`:`${base}/stream/video/${selectedPid}`;
        let hList = getStoredList('jash_history_v2').filter(x=>x.id!==movie.id); hList.unshift(movie); if(hList.length>30) hList.pop(); saveStoredList('jash_history_v2', hList);
        updateWatchlistBtn();
      }

      function updateWatchlistBtn() {
        if (!activeMovieState) return;
        const isSaved = getStoredList(WATCHLIST_KEY).some(x=>x.id===activeMovieState.id), b = document.getElementById('modalWatchlistBtn');
        if (b) { b.classList.toggle('active', isSaved); b.innerHTML = isSaved ? '<i class="fas fa-check"></i> In Watchlist' : '<i class="fas fa-bookmark"></i> Watchlist'; }
      }

      async function switchTabUI(t) {
        currentTab = t; document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
        document.getElementById(`tab-${t}`)?.classList.add('active');
        if (t === 'saved') {
          document.getElementById('feedStage').style.display = 'none'; document.getElementById('savedStage').style.display = 'block'; document.getElementById('savedStage').classList.add('active');
          const w = getStoredList(WATCHLIST_KEY), h = getStoredList('jash_history_v2');
          document.getElementById('watchlistGrid').innerHTML = w.length ? w.map(createMovieCard).join('') : `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-desc">Watchlist is empty</div></div>`;
          document.getElementById('historyGrid').innerHTML = h.length ? h.map(createMovieCard).join('') : `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-desc">No watch history</div></div>`;
          attachHandlers();
        } else {
          document.getElementById('feedStage').style.display = 'block'; document.getElementById('savedStage').style.display = 'none'; document.getElementById('savedStage').classList.remove('active');
          if (t==='play'||t==='dub') activeCategory = t;
          document.getElementById('heroBanner').style.display = t === 'home' ? 'flex' : 'none';
          const targetCat = t==='home'?'play':activeCategory;
          const res = await fetch(`data/${targetCat}/pages/page-1.json?_=`+Date.now()); currentLoadedChunk = await res.json();
          renderGrid('moviesGrid', currentLoadedChunk);
          document.getElementById('statsCountBadge').innerText = `🎬 Displaying Page 1`;
        }
      }

      try {
        const [mRes, sRes] = await Promise.all([fetch('data/manifest.json?_='+Date.now()), fetch('data/search-index.json?_='+Date.now())]);
        manifest = await mRes.json(); searchIdx = await sRes.json();
        const feat = manifest.featured || [];
        if (feat.length) {
          document.getElementById('heroSlider').innerHTML = feat.map(m=>`<div class="hero-slide"><div class="hero-backdrop"><img src="${m.poster}"></div><div class="hero-grad"></div><div class="hero-content"><div class="hero-tags"><span class="badge badge-accent">🔥 Featured Release</span><span class="badge badge-surface">${m.category}</span>${m.year?`<span class="badge badge-surface">${m.year}</span>`:''}</div><h2 class="hero-title">${m.title}</h2><p class="hero-plot">${m.plot||'Experience high-definition cinema...'}</p><div class="hero-btns"><button class="btn-play" onclick="document.querySelector('.movie-card[data-id=\\'${m.id}\\']')?.click()"><i class="fas fa-play"></i> Watch Now</button></div></div></div>`).join('');
          document.getElementById('heroDots').innerHTML = feat.map((_,i)=>`<div class="hero-dot${i===0?' active':''}"></div>`).join('');
        }
        document.getElementById('logoLink').onclick = () => switchTabUI('home');
        document.getElementById('tab-home').onclick = () => switchTabUI('home');
        document.getElementById('tab-play').onclick = () => switchTabUI('play');
        document.getElementById('tab-dub').onclick = () => switchTabUI('dub');
        document.getElementById('tab-saved').onclick = () => switchTabUI('saved');
        document.getElementById('themeBtn').onclick = () => {
          const thms = ['dark','oled','light'], curr = document.documentElement.getAttribute('data-theme')||'dark', nxt = thms[(thms.indexOf(curr)+1)%3];
          document.documentElement.setAttribute('data-theme', nxt); localStorage.setItem('jash-theme_v2', nxt);
          document.querySelector('#themeBtn i').className = nxt==='light'?'fas fa-sun':(nxt==='oled'?'fas fa-circle':'fas fa-moon');
        };
        document.querySelector('.btn-back').onclick = () => { document.getElementById('theatreModal').classList.remove('active'); document.body.style.overflow = 'auto'; document.getElementById('playerIframe').src = ''; };
        document.getElementById('modalWatchlistBtn').onclick = () => {
          if (!activeMovieState) return; let w = getStoredList(WATCHLIST_KEY);
          if (w.some(x=>x.id===activeMovieState.id)) w = w.filter(x=>x.id!==activeMovieState.id); else w.unshift(activeMovieState);
          saveStoredList(WATCHLIST_KEY, w); updateWatchlistBtn(); showToastAlert('🔖 Watchlist Updated');
        };
        document.getElementById('clearWatchlistBtn').onclick = () => { localStorage.removeItem(WATCHLIST_KEY); switchTabUI('saved'); showToastAlert('🗑️ Cleared'); };
        document.getElementById('clearHistoryBtn').onclick = () => { localStorage.removeItem('jash_history_v2'); switchTabUI('saved'); showToastAlert('🗑️ Cleared'); };
        document.getElementById('shareBtn').onclick = () => { navigator.clipboard.writeText(window.location.href); showToastAlert('📋 Link Copied!'); };
        switchTabUI('home');
      } catch(e) { console.error("Preview init error:", e); }
    }, 150);
  </script>
</body>
</html>
