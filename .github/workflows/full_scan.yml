name: JaSH Full Scan (Rebuild)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  full-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install requests beautifulsoup4

    - name: Run full scan in batches with periodic commits
      run: |
        for i in $(seq 1 40); do
          echo "========================================="
          echo "  BATCH $i / 40"
          echo "========================================="
          python full_scan.py --batch-size 5000

          # Commit progress after each batch
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/*.json
          git commit -m "Full scan progress: batch $i" || echo "No changes in batch $i"
          git pull --rebase origin main || true
          git push || true

          echo "Batch $i committed. Continuing..."
        done

    - name: Final commit
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/*.json
        git commit -m "Full scan complete" || echo "Already committed."
        git pull --rebase origin main
        git push
