name: Weekly Link Audit

on:
  schedule:
    - cron: '0 4 * * 0' # Sundays at 4am
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Audit
        run: python3 scripts/audit.py
