name: Daily Auto Updater & Chunk Compiler

on:
  schedule:
    - cron: '0 0 * * *' # Midnight UTC
  workflow_dispatch:

jobs:
  update-catalogue:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scrape New Streams
        run: python3 scripts/update_movies.py

      - name: Enrich OMDb Metadata
        env:
          OMDB_KEYS: ${{ secrets.OMDB_KEYS }}
        run: python3 scripts/enrich.py

      - name: Build Static JSON Chunks
        run: python3 scripts/build_chunks.py

      - name: Validate JSON Schema
        run: python3 scripts/validate_data.py

      - name: Commit & Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "🤖 Auto-update catalogue: New streams & chunk recompilation"
            git pull --rebase origin main
            git push
          else
            echo "Database is fully up to date."
          fi
