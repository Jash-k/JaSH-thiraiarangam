name: Manual OMDb Enrichment

on:
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Enricher
        env:
          OMDB_KEYS: ${{ secrets.OMDB_KEYS }}
        run: python3 scripts/enrich.py
      - name: Rebuild Chunks
        run: python3 scripts/build_chunks.py
      - name: Commit
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "⭐ Manual enrichment update"
            git push
          fi
